spring.application.name=proveedor-service
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/db_minimarket

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.output.ansi.enabled=always

spring.jpa.open-in-view=false

logging.level.root= INFO

logging.level.com.minimarket=DEBUG

logging.pattern.console=%d{HH:mm:ss} [%level] %logger{20}: %msg%n

logging.file.name = logs/proveedor-service.log

logging.max-size = 10MB

logging.max-history = 30