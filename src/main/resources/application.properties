spring.application.name=proveedor-service
server.port=${PORT:8085}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_minimarket?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform = org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

spring.output.ansi.enabled=always

spring.jpa.open-in-view=false

logging.level.root= INFO

logging.level.com.minimarket=DEBUG

logging.pattern.console=%d{HH:mm:ss} [%level] %logger{20}: %msg%n

logging.file.name = logs/proveedor-service.log
# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=health,info


# Railway: permite desactivar Eureka si usas URLs directas
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
